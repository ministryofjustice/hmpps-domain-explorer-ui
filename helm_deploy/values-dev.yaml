---
# Per environment values which override defaults in hmpps-domain-explorer-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: domain-explorer-ui-dev.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://domain-explorer-ui-dev.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-dev.prison.service.justice.gov.uk"
    DOMAIN_EXPLORER_API_URL: "http://domain-explorer-api-dev.hmpps.service.justice.gov.uk"
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"
    REDIS_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: hmpps-people-on-probation-nonprod
